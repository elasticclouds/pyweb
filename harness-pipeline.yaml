pipeline:
  name: pyweb
  identifier: pyweb
  projectIdentifier: US_Bank_Projects
  orgIdentifier: default
  tags: {}
  properties:
    ci:
      codebase:
        connectorRef: elasticcloudsgithub
        repoName: pyweb
        build: <+input>
        sparseCheckout: []
  stages:
    - stage:
        name: build
        identifier: build
        description: ""
        type: CI
        spec:
          cloneCodebase: true
          caching:
            enabled: true
            override: true
          buildIntelligence:
            enabled: true
          execution:
            steps:
              - step:
                  type: Run
                  name: Setup and Install
                  identifier: Run_1
                  spec:
                    shell: Bash
                    command: |-
                      set -e
                      python --version
                      python -m venv .venv
                      source .venv/bin/activate
                      pip install --upgrade pip
                      if [ -f requirements.txt ]; then
                        pip install -r requirements.txt
                      fi

                      # if command -v flake8 >/dev/null 2>&1; then
                      #   flake8 .
                      # else
                      #   echo "flake8 not installed, skipping lint step"
                      # fi

                      # if [ -f pytest.ini ] || [ -d tests ] || [ -f setup.cfg ]; then
                      #   pytest -q
                      # else
                      #   echo "No pytest config or tests folder found; skipping tests"
                      fi
                  description: Setup and Install
              - step:
                  type: Run
                  name: Lint
                  identifier: Lint
                  spec:
                    shell: Sh
                    command: |-
                      set -e
                      python --version
                  description: Lint
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
