# Harness CI pipeline for pyweb Flask project
# Usage: import this YAML into Harness CI, or reference from Harness project settings.
# Set projectIdentifier/orgIdentifier to your Harness values before using.


version: 1.0
pipeline:
  name: pyweb-CI
  identifier: pyweb_CI
  projectIdentifier: YOUR_PROJECT
  orgIdentifier: YOUR_ORG
  tags:
    - flask
    - python
  stages:
    - stage:
        name: BuildAndTest
        identifier: BuildAndTest
        type: CI
        spec:
          cloneCodebase: true
          execution:
            steps:
              - step:
                  name: Setup and Install
                  identifier: setup_install
                  type: Run
                  spec:
                    shell: Bash
                    command: |
                      set -e
                      python --version
                      python -m venv .venv
                      source .venv/bin/activate
                      pip install --upgrade pip
                      if [ -f requirements.txt ]; then
                        pip install -r requirements.txt
                      fi

              - step:
                  name: Lint
                  identifier: lint
                  type: Run
                  spec:
                    shell: Bash
                    command: |
                      set -e
                      source .venv/bin/activate
                      if command -v flake8 >/dev/null 2>&1; then
                        flake8 .
                      else
                        echo "flake8 not installed, skipping lint step"
                      fi

              - step:
                  name: Unit Tests
                  identifier: unit_tests
                  type: Run
                  spec:
                    shell: Bash
                    command: |
                      set -e
                      source .venv/bin/activate
                      if [ -f pytest.ini ] || [ -d tests ] || [ -f setup.cfg ]; then
                        pytest -q
                      else
                        echo "No pytest config or tests folder found; skipping tests"
                      fi

  triggers:
    - trigger:
        type: Git
        spec:
          type: Webhook
          branch:
            - master
            - main
            - dev
